name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format gcc make

      - name: Format check
        run: make format-check

      - name: Build
        run: make

      - name: Run tests
        run: make test || true
